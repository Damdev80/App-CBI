<!-- ═══════════════════════════════════════════════
     404 — Página no encontrada
     ═══════════════════════════════════════════════ -->
<div class="min-h-screen flex flex-col items-center justify-center bg-page" style="padding: 2rem; text-align: center;">

  <div class="fade-up">
    <p style="font-family: var(--serif); font-size: clamp(6rem, 20vw, 12rem); font-weight: 300; color: var(--line); line-height: 1; letter-spacing: -0.04em; margin-bottom: 0;">
      404
    </p>

    <div style="max-width: 360px; margin: 0 auto;">
      <h1 style="font-family: var(--serif); font-size: 1.75rem; font-weight: 600; color: var(--ink); margin-bottom: 0.625rem; letter-spacing: -0.01em;">
        Página no encontrada
      </h1>
      <p style="font-size: 0.9375rem; color: var(--ink-3); margin-bottom: 2rem;">
        La ruta que buscas no existe o fue movida a otro lugar.
      </p>
      <button class="btn-solid" type="button" (click)="navigateTo('/')">
        Volver al inicio
      </button>
    </div>
  </div>

</div>
