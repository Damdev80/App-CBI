<app-lema-cbi-fullwidth />

<!-- ─── Pastores Section ─── -->
<section class="bg-page fade-up" style="padding: 6rem 1.5rem; border-bottom: 1px solid var(--line);">
  <div style="max-width: 1100px; margin: 0 auto; display: flex; flex-direction: column; gap: 4rem; align-items: center;"
       class="md:flex-row">

    <div style="flex: 1; min-width: 280px;">
      <p style="font-size: 0.6875rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-3); font-weight: 500; margin-bottom: 0.75rem;">
        Liderazgo
      </p>
      <h2 style="font-family: var(--serif); font-size: clamp(2rem, 5vw, 3.25rem); font-weight: 600; color: var(--ink); letter-spacing: -0.02em; line-height: 1.1; margin-bottom: 1.25rem;">
        Pastores de la casa
      </h2>
      <p style="font-size: 1rem; color: var(--ink-2); line-height: 1.7; margin-bottom: 1rem;">
        Conoce a los pastores de la casa, quienes lideran con amor y dedicación.
      </p>
      <p style="font-size: 0.9375rem; color: var(--ink-3); line-height: 1.7; margin-bottom: 2rem;">
        Pastores Samuel Mejías y Marjorie Mejía han guiado nuestra comunidad con fe y compromiso, inspirando a todos a crecer espiritualmente.
      </p>
      <div style="display: flex; gap: 0.5rem; flex-wrap: wrap;">
        <span class="badge badge-accent">#Liderazgo</span>
        <span class="badge badge-accent">#Inspiración</span>
      </div>
    </div>

    <div style="flex: 1; display: flex; justify-content: center;">
      <div style="position: relative;">
        <img
          src="new-imgs/Foto Sam & Maryo casa.png"
          alt="Pastores principales"
          style="width: min(420px, 90vw); height: min(420px, 90vw); object-fit: cover; border-radius: var(--r2); display: block;"
        />
        <div style="position: absolute; bottom: 1rem; right: 1rem; background: var(--accent); color: white; font-size: 0.8125rem; font-weight: 500; padding: 0.375rem 0.875rem; border-radius: var(--r);">
          Samuel &amp; Marjorie Mejía
        </div>
      </div>
    </div>

  </div>
</section>
