<section style="min-height:calc(100vh - 4rem); background:var(--accent); display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden;">

  <!-- Fondo con patrón de puntos sutil -->
  <div style="position:absolute; inset:0; opacity:0.04;
              background-image:radial-gradient(circle, white 1px, transparent 1px);
              background-size:32px 32px; pointer-events:none;"></div>

  <!-- Gradiente superior -->
  <div style="position:absolute; top:0; left:0; right:0; height:180px;
              background:linear-gradient(180deg,rgba(0,0,0,0.25) 0%,transparent 100%);
              pointer-events:none;"></div>

  <!-- Gradiente inferior -->
  <div style="position:absolute; bottom:0; left:0; right:0; height:180px;
              background:linear-gradient(0deg,rgba(0,0,0,0.25) 0%,transparent 100%);
              pointer-events:none;"></div>

  <!-- Contenido central -->
  <div class="relative z-10 text-center px-4 py-12 sm:px-6 sm:py-16 md:py-20 max-w-[860px] w-full mx-auto">

    <!-- Etiqueta año -->
    <div style="display:inline-flex; align-items:center; gap:0.5rem; padding:0.375rem 1rem;
                border:1px solid rgba(255,255,255,0.22); border-radius:999px; margin-bottom:2.5rem;">
      <span style="width:6px; height:6px; border-radius:50%; background:rgba(255,255,255,0.65);"></span>
      <span style="font-size:0.6875rem; letter-spacing:0.12em; text-transform:uppercase;
                   color:rgba(255,255,255,0.65); font-weight:500; font-family:var(--sans);">
        Lema 2026 · Iglesia CBI Sincelejo
      </span>
    </div>

    <!-- Título del lema -->
    <h1 style="font-family:var(--serif); font-size:clamp(2.5rem,8vw,5.5rem); font-weight:300;
               color:white; letter-spacing:-0.025em; line-height:1.1; margin:0 0 0.5rem;">
      Bajo la Dirección
    </h1>
    <h1 style="font-family:var(--serif); font-size:clamp(2.5rem,8vw,5.5rem); font-weight:400;
               font-style:italic; color:white; letter-spacing:-0.025em; line-height:1.1; margin:0 0 2.5rem;">
      del Espíritu Santo
    </h1>

    <!-- Ornamento separador -->
    <div style="display:flex; align-items:center; justify-content:center; gap:1.25rem; margin-bottom:2.5rem;">
      <div style="height:1px; width:80px; background:rgba(255,255,255,0.28);"></div>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.25">
        <path stroke-linecap="round" stroke-linejoin="round"
              d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
      </svg>
      <div style="height:1px; width:80px; background:rgba(255,255,255,0.28);"></div>
    </div>

    <!-- Versículo Juan 16:13 NTV -->
    <blockquote style="margin:0; padding:0 1rem; max-width:680px; margin-left:auto; margin-right:auto;">
      <p style="font-family:var(--serif); font-size:clamp(1.0625rem,2.2vw,1.375rem); font-weight:300;
                font-style:italic; color:rgba(255,255,255,0.88); line-height:1.7; margin:0 0 1.25rem;">
        "Cuando venga el Espíritu de verdad, él los guiará a toda la verdad.
        Él no hablará por su propia cuenta, sino que les dirá lo que ha oído
        y les contará lo que sucederá en el futuro."
      </p>
      <footer style="display:flex; align-items:center; justify-content:center; gap:0.75rem;">
        <span style="display:block; width:24px; height:1px; background:rgba(255,255,255,0.35);"></span>
        <span style="font-size:0.8125rem; letter-spacing:0.08em; text-transform:uppercase;
                     color:rgba(255,255,255,0.45); font-weight:500; font-family:var(--sans);">
          Juan 16:13 · NTV
        </span>
        <span style="display:block; width:24px; height:1px; background:rgba(255,255,255,0.35);"></span>
      </footer>
    </blockquote>

    <!-- Flecha de scroll -->
    <div style="margin-top:5rem; display:flex; flex-direction:column; align-items:center; gap:0.5rem; opacity:0.35;">
      <span style="font-size:0.625rem; letter-spacing:0.12em; text-transform:uppercase; color:white; font-family:var(--sans);">Descubrir</span>
      <svg width="14" height="14" fill="none" stroke="white" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 9l-7 7-7-7"/>
      </svg>
    </div>

  </div>
</section>
