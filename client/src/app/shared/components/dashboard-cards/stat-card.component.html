<p-card styleClass="shadow-xl hover:shadow-2xl transition-shadow duration-300">
  <div class="flex items-center justify-between">
    <div class="flex-1">
      <h2 class="text-secondary-text text-sm font-medium mb-2">
        {{ title() }}
      </h2>
      <p class="text-4xl font-bold text-main" [class]="'text-4xl font-bold text-main ' + valueColorClass()">
        {{ value() }}
      </p>
      <p class="text-sm text-muted mt-2" *ngIf="description()">
        {{ description() }}
      </p>
    </div>
    
    <div *ngIf="icon()" class="flex items-center justify-center">
      <div class="w-16 h-16 rounded-full flex items-center justify-center" [class]="'w-16 h-16 rounded-full flex items-center justify-center ' + iconColorClass()">
        <span [innerHTML]="icon()"></span>
      </div>
    </div>
  </div>
</p-card>
