<div class="flex gap-3 items-end flex-wrap">
  <div class="flex flex-col gap-1">
    <label class="text-sm font-medium text-main">Libro</label>
    <p-select [(ngModel)]="selectedBook" (onChange)="onBookChange()" [options]="bookOptions" optionLabel="label" optionValue="value" styleClass="w-48" />
  </div>

  <div class="flex flex-col gap-1">
    <label class="text-sm font-medium text-main">Capítulo</label>
    <p-select [(ngModel)]="selectedChapter" [options]="chapterOptions" optionLabel="label" optionValue="value" placeholder="--" styleClass="w-28" />
  </div>

  <div class="flex flex-col gap-1">
    <label class="text-sm font-medium text-main">Versión</label>
    <input [(ngModel)]="version" placeholder="nvi (opcional)" pInputText class="w-36" />
  </div>

  <p-button label="Cargar capítulo" (click)="fetchChapter()" />
</div>

<div class="flex gap-3 items-end flex-wrap mt-3">
  <div class="flex flex-col gap-1">
    <label class="text-sm font-medium text-main">Rango (ej. 5-10)</label>
    <input #rangeInput pInputText class="w-36" />
  </div>
  <p-button label="Cargar rango" (click)="fetchRange(rangeInput.value)" />

  <div class="flex flex-col gap-1 ml-4">
    <label class="text-sm font-medium text-main">Versículo #</label>
    <input #verseInput type="number" pInputText class="w-28" />
  </div>
  <p-button label="Cargar versículo" (click)="fetchVerse(+verseInput.value)" />
</div>

<p-message *ngIf="error" severity="error" styleClass="mt-3">{{ error }}</p-message>

<div *ngIf="result" class="mt-3">
  <h3 class="text-xl font-semibold text-main">{{ selectedBook }} {{ selectedChapter }}</h3>

  <div *ngIf="result.verses; else raw">
    <div *ngFor="let v of result.verses" class="mb-2">
      <strong>{{ v.number }}</strong> — {{ v.verse }}
    </div>
  </div>

  <ng-template #raw>
    <pre>{{ result | json }}</pre>
  </ng-template>
</div>
