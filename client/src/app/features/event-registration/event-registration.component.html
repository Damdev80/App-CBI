<div class="min-h-screen bg-surface-50 py-8 px-4">
  <div class="max-w-lg mx-auto">
    
    <!-- Botón de Regreso -->
    <div class="mb-4">
      <p-button [text]="true" size="small" (click)="goBack()" icon="pi pi-arrow-left" label="Volver" />
    </div>

    <div class="text-center mb-6">
      <h1 class="text-3xl font-bold text-surface-700 mb-2">Inscripción a Evento</h1>
      <p class="text-surface-400">Completa tus datos para registrarte</p>
    </div>

    <p-card>
        <form [formGroup]="registrationForm" (ngSubmit)="onSubmit()">
          
          <div class="flex flex-col gap-2 mb-4">
            <label class="font-medium">Evento <span class="text-red-500">*</span></label>
            <p-select 
              formControlName="eventId" 
              [options]="eventOptions"
              optionLabel="label"
              optionValue="value"
              placeholder="Selecciona un evento"
              styleClass="w-full"
              [invalid]="f['eventId'].touched && f['eventId'].invalid"
            />
            <small class="text-red-500" *ngIf="f['eventId'].touched && f['eventId'].invalid">Debes seleccionar un evento</small>
          </div>

          <div class="flex flex-col gap-2 mb-4">
            <label class="font-medium">Nombre Completo <span class="text-red-500">*</span></label>
            <input 
              type="text" 
              placeholder="Ingresa tu nombre completo"
              formControlName="name" 
              pInputText
              class="w-full"
              [class.ng-invalid]="f['name'].touched && f['name'].invalid"
            />
            <small class="text-red-500" *ngIf="f['name'].touched && f['name'].invalid">El nombre es requerido (mínimo 3 caracteres)</small>
          </div>

          <div class="flex flex-col gap-2 mb-4">
            <label class="font-medium">Correo Electrónico <span class="text-red-500">*</span></label>
            <input 
              type="email" 
              placeholder="ejemplo@correo.com"
              formControlName="email" 
              pInputText
              class="w-full"
            />
            <small class="text-red-500" *ngIf="f['email'].touched && f['email'].invalid">Ingresa un correo válido</small>
          </div>

          <div class="flex flex-col gap-2 mb-4">
            <label class="font-medium">Teléfono</label>
            <input 
              type="tel" 
              placeholder="Ej: 3001234567"
              formControlName="phone" 
              pInputText
              class="w-full"
            />
          </div>

          <div class="flex flex-col gap-2 mb-4">
            <label class="font-medium">Fecha de Nacimiento <span class="text-red-500">*</span></label>
            <input 
              type="date" 
              formControlName="dateBorn" 
              pInputText
              class="w-full"
            />
            <small class="text-red-500" *ngIf="f['dateBorn'].touched && f['dateBorn'].invalid">La fecha de nacimiento es requerida</small>
          </div>

          <div class="flex items-center gap-3 mb-4">
            <p-checkbox 
              formControlName="hasSiblings" 
              [binary]="true"
              inputId="hasSiblings"
            />
            <label for="hasSiblings">¿Va a inscribir a su hermano/a también?</label>
          </div>

          <p-divider />

          <p-message *ngIf="successMessage" severity="success" styleClass="mb-4 w-full">
            {{ successMessage }}
          </p-message>

          <p-message *ngIf="errorMessage" severity="error" styleClass="mb-4 w-full">
            {{ errorMessage }}
          </p-message>

          <div class="flex justify-end gap-2 mt-6">
            <p-button 
              label="Limpiar" 
              [text]="true" 
              (click)="resetForm()"
              [disabled]="loading"
            />
            <p-button 
              type="submit" 
              label="Registrarse"
              [disabled]="loading"
              [loading]="loading"
            />
          </div>

        </form>
    </p-card>

  </div>
</div>
