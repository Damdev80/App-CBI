<!-- ═══════════════════════════════════════════════
     DASHBOARD — Panel de Control
     ═══════════════════════════════════════════════ -->
<div style="max-width: 1200px; margin: 0 auto;">

  <!-- Page header -->
  <div class="fade-up" style="margin-bottom: 2.5rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--line);">
    <p style="font-size: 0.6875rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-3); font-weight: 500; margin-bottom: 0.375rem;">
      Panel de Control
    </p>
    <h1 style="font-family: var(--serif); font-size: 2.5rem; font-weight: 600; color: var(--ink); letter-spacing: -0.02em; margin-bottom: 0.5rem;">
      Bienvenido
    </h1>
    <p style="font-size: 0.9375rem; color: var(--ink-2);">
      Administra y consulta la información clave de tu comunidad.
    </p>
    <div style="margin-top: 0.875rem;">
      <span class="badge badge-accent">Administrador</span>
    </div>
  </div>

  <!-- Error -->
  @if (error()) {
    <div class="alert alert-err fade-up" style="margin-bottom: 1.5rem;">{{ error() }}</div>
  }

  <!-- Loading -->
  @if (isLoading()) {
    <div style="display: flex; justify-content: center; align-items: center; padding: 4rem 0;">
      <span class="spinner spinner-lg" style="color: var(--accent);"></span>
    </div>
  }

  <!-- Stats grid -->
  @if (!isLoading()) {
    <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 1.25rem;">

      <app-stat-card
        [title]="'Total Usuarios'"
        [value]="totalUsers()"
        [description]="'Usuarios registrados en el sistema'"
        [color]="'primary'"
        [icon]="'<svg width=&quot;20&quot; height=&quot;20&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; viewBox=&quot;0 0 24 24&quot;><path stroke-linecap=&quot;round&quot; stroke-linejoin=&quot;round&quot; stroke-width=&quot;1.75&quot; d=&quot;M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z&quot;/></svg>'"
      />

      <app-stat-card
        [title]="'Usuarios Bautizados'"
        [value]="totalBautized()"
        [description]="'Hermanos bautizados'"
        [color]="'success'"
        [icon]="'<svg width=&quot;20&quot; height=&quot;20&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; viewBox=&quot;0 0 24 24&quot;><path stroke-linecap=&quot;round&quot; stroke-linejoin=&quot;round&quot; stroke-width=&quot;1.75&quot; d=&quot;M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z&quot;/></svg>'"
      />

      <app-stat-card
        *ngIf="role() === 'ADMIN' || role() === 'LIDER'"
        [title]="'Total Mujeres'"
        [value]="totalWomenRegistered()"
        [description]="'Hermanas registradas'"
        [color]="'warning'"
        [icon]="'<svg width=&quot;20&quot; height=&quot;20&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; viewBox=&quot;0 0 24 24&quot;><path stroke-linecap=&quot;round&quot; stroke-linejoin=&quot;round&quot; stroke-width=&quot;1.75&quot; d=&quot;M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z&quot;/></svg>'"
      />

      <app-stat-card
        *ngIf="role() === 'ADMIN' || (role() === 'LIDER' && groupIds().includes('1a6def74-d335-4c66-892d-ee02cd5cb96c'))"
        [title]="'Congreso Juvenil'"
        [value]="totalcountUnpaid()"
        [description]="'Usuarios sin pagar'"
        [color]="'error'"
        [icon]="'<svg width=&quot;20&quot; height=&quot;20&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; viewBox=&quot;0 0 24 24&quot;><path stroke-linecap=&quot;round&quot; stroke-linejoin=&quot;round&quot; stroke-width=&quot;1.75&quot; d=&quot;M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z&quot;/></svg>'"
      />

    </div>
  }

</div>
