<!-- Toast para notificaciones -->
<p-toast />

<div class="flex flex-col min-h-screen">
  <!-- Header / Toolbar -->
  <p-toolbar styleClass="border-b border-main shadow-sm bg-main text-main">
    <ng-template #start>
      <p-button icon="pi pi-bars" [rounded]="true" [text]="true" (click)="sidebarVisible.set(true)" />
    </ng-template>
    <ng-template #center>
      <div class="flex items-center gap-2">
        <img src="/img/cbiLogo.svg" alt="CBI" class="w-10 h-10"/>
      </div>
    </ng-template>
    <ng-template #end>
      <div class="flex items-center gap-2">
        <p-button icon="pi pi-bell" [rounded]="true" [text]="true" />
        <p-avatar icon="pi pi-user" shape="circle" (click)="userMenu.toggle($event)" styleClass="cursor-pointer" />
        <p-menu #userMenu [model]="userMenuItems" [popup]="true" />
      </div>
    </ng-template>
  </p-toolbar>

  <!-- Contenido principal -->
  <main class="flex-1 p-6 bg-secondary-bg text-main">
    <router-outlet></router-outlet>
  </main>
</div>

<!-- Sidebar / Drawer -->
<p-drawer [(visible)]="sidebarVisible" [header]="''" styleClass="w-80">
  <ng-template #header>
    <div class="flex items-center justify-between w-full">
      <img src="img/cbiLogo.svg" alt="CBI" class="w-20 h-20"/>
    </div>
  </ng-template>

  <div class="flex flex-col gap-1">
    <!-- Dashboard -->
    <p-button label="Dashboard" icon="pi pi-home" [text]="true" styleClass="w-full justify-start" (click)="navegateTo('/dashboard')" />

    <!-- Registros de Eventos (expandible) -->
    <div>
      <p-button label="Registros de Eventos" icon="pi pi-calendar" [text]="true" styleClass="w-full justify-start"
        [icon]="eventsExpanded() ? 'pi pi-chevron-down' : 'pi pi-chevron-right'" iconPos="right"
        (click)="eventsExpanded.set(!eventsExpanded())" />
      @if (eventsExpanded()) {
        <div class="ml-6 flex flex-col gap-1 max-h-60 overflow-y-auto">
          @if (loadingEvents()) {
            <div class="flex justify-center p-2">
              <p-progressSpinner [style]="{width: '24px', height: '24px'}" strokeWidth="4" />
            </div>
          }
          @if (!loadingEvents() && events().length === 0) {
            <span class="text-xs text-muted p-2">No hay eventos</span>
          }
          @for (event of events(); track event.id) {
            <ng-container *ngIf="event.title !== 'Congreso Juvenil' || userRole === 'juvenil'">
              <p-button [text]="true" styleClass="w-full justify-start text-sm" (click)="navigateToEventDetails(event.id)">
                <div class="flex flex-col items-start">
                  <span class="font-medium">{{ event.title }}</span>
                  <span class="text-xs opacity-60">{{ event.eventDate | date:'dd/MM/yyyy' }}</span>
                </div>
              </p-button>
            </ng-container>
          }
        </div>
      }
    </div>

    <!-- Usuarios -->
    <p-button label="Usuarios" icon="pi pi-users" [text]="true" styleClass="w-full justify-start" (click)="navegateTo('/dashboard/users')" />

    <!-- Grupos -->
    <p-button label="Grupos" icon="pi pi-sitemap" [text]="true" styleClass="w-full justify-start" (click)="navegateTo('/dashboard/groups')" />

    <!-- Servicio Social -->
    <div>
      <p-button label="Servicio Social" icon="pi pi-book" [text]="true" styleClass="w-full justify-start"
        [icon]="socialExpanded() ? 'pi pi-chevron-down' : 'pi pi-chevron-right'" iconPos="right"
        (click)="socialExpanded.set(!socialExpanded())" />
      @if (socialExpanded()) {
        <div class="ml-6 flex flex-col gap-1">
          <p-button label="Profesores" icon="pi pi-user" [text]="true" styleClass="w-full justify-start text-sm" (click)="navegateTo('/dashboard/profesores')" />
          <p-button label="Alumnos" icon="pi pi-users" [text]="true" styleClass="w-full justify-start text-sm" (click)="navegateTo('/dashboard/servicio-social')" />
        </div>
      }
    </div>

    <p-divider />

    <!-- Cerrar Sesión -->
    <p-button label="Cerrar Sesión" icon="pi pi-sign-out" [text]="true" severity="danger" styleClass="w-full justify-start" (click)="logout()" />
  </div>
</p-drawer>
