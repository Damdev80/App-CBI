<!-- HEADER -->
<p-toolbar styleClass="border-b border-surface-200 shadow-sm">
  <ng-template #start>
    <button (click)="navigateTo('/')" class="flex items-center gap-2 px-2 cursor-pointer bg-transparent border-none">
      <img src="/img/cbiLogo.svg" alt="CBI" class="w-15 h-15"/>
    </button>
  </ng-template>
  <ng-template #end>
    <div class="flex gap-2">
      <p-button label="Iniciar Sesión" [text]="true" size="small" (click)="navigateTo('/login')" />
      <p-button label="Registrarse" size="small" (click)="navigateTo('/register')" />
    </div>
  </ng-template>
</p-toolbar>

<!-- MAIN CONTENT -->
<main class="min-h-screen overflow-x-hidden">
  <router-outlet></router-outlet>
</main>

<!-- FOOTER -->
<footer class="text-center bg-surface-50 py-8 border-t border-surface-200">
  <div class="max-w-md mx-auto">
    <div class="flex items-center justify-center gap-2 mb-4">
      <img src="/img/cbiLogo.svg" alt="CBI" class="w-6 h-6 opacity-80"/>
      <p class="font-semibold text-sm">Iglesia CBI</p>
    </div>
    <p class="text-xs opacity-70">&copy; {{ currentYear }} Todos los derechos reservados</p>
    <p class="text-sm italic mt-2">"Un lugar para crecer en comunidad."</p>
  </div>
</footer>
