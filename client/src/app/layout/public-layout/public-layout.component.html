<!-- ─── HEADER ─── -->
<header class="bg-surface border-b border-line sticky top-0 z-50">
  <div class="max-w-6xl mx-auto px-3 sm:px-6 flex items-center justify-between h-[60px] gap-2 sm:gap-4">

    <button (click)="navigateTo('/')" class="flex items-center gap-3 btn-ghost" style="padding: 0.375rem 0.5rem;">
      <img src="/img/cbiLogo.svg" alt="CBI" style="width: 32px; height: 32px;" />
      <span class="hidden sm:inline" style="font-family: var(--serif); font-size: 1.25rem; font-weight: 600; color: var(--ink); letter-spacing: -0.01em;">
        Iglesia CBI
      </span>
    </button>

    <nav class="flex items-center gap-1 shrink-0">
      <app-theme-toggle />
      <button class="btn-ghost hidden sm:inline-flex" style="padding: 0.375rem 0.75rem; font-size: 0.875rem; color: var(--ink-2);"
              type="button" (click)="navigateTo('/biblia')">Estudio Bíblico</button>
      <button class="btn-ghost" style="padding: 0.375rem 0.75rem; font-size: 0.875rem; color: var(--ink-2);"
              type="button" (click)="navigateTo('/login')">
        Iniciar sesión
      </button>
      <button class="btn-solid" style="padding: 0.375rem 0.875rem; font-size: 0.875rem;"
              type="button" (click)="navigateTo('/register')">
        Registrarse
      </button>
    </nav>

  </div>
</header>

<!-- ─── CONTENT ─── -->
<main class="bg-page" style="min-height: calc(100vh - 120px);">
  <router-outlet></router-outlet>
</main>

<!-- ─── FOOTER ─── -->
<footer class="bg-surface border-t border-line">
  <div class="max-w-6xl mx-auto px-4 sm:px-6 py-8 sm:py-10 flex flex-col md:flex-row items-center justify-between gap-6 text-center md:text-left">

    <div class="flex items-center gap-3">
      <img src="/img/cbiLogo.svg" alt="CBI" style="width: 28px; height: 28px; opacity: 0.7;" />
      <div>
        <p style="font-family: var(--serif); font-size: 1rem; font-weight: 600; color: var(--ink);">Iglesia CBI</p>
        <p style="font-size: 0.75rem; color: var(--ink-3);">&copy; {{ currentYear }} · Todos los derechos reservados</p>
      </div>
    </div>

    <p style="font-size: 0.875rem; color: var(--ink-3); font-style: italic; text-align: center;">
      "Un lugar para crecer en comunidad."
    </p>

  </div>
</footer>
