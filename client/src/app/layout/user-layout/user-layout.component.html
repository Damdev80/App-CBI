<div class="flex h-screen overflow-hidden bg-page">
  @if (sidebarOpen()) {
    <div class="fixed inset-0 z-30 lg:hidden" style="background: rgba(0,0,0,0.25);"
         (click)="sidebarOpen.set(false)"></div>
  }

  <aside class="fixed lg:static inset-y-0 left-0 z-40 flex flex-col bg-surface border-r border-line w-56"
         [class.sidebar-visible]="sidebarOpen()">
    <div class="flex items-center gap-2.5 p-4 border-b border-line">
      <img src="img/cbiLogo.svg" alt="CBI" style="width: 28px; height: 28px;" />
      <span style="font-family: var(--serif); font-size: 1.05rem; font-weight: 600;">Iglesia CBI</span>
    </div>
    <nav class="flex-1 p-3 space-y-1">
      <button class="sidebar-btn w-full justify-start" (click)="navegateTo('/app')">
        <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.75" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
        <span>Inicio</span>
      </button>
      <button class="sidebar-btn w-full justify-start" (click)="navegateTo('/app/profile')">
        <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.75" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
        <span>Mi perfil</span>
      </button>
      <button class="sidebar-btn w-full justify-start" (click)="navegateTo('/app/eventos')">
        <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.75" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
        <span>Eventos</span>
      </button>
      <button class="sidebar-btn w-full justify-start" (click)="navegateTo('/app/foro')">
        <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.75" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
        <span>Foro</span>
      </button>
      <button class="sidebar-btn w-full justify-start" (click)="navegateTo('/app/biblia')">
        <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.75" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
        <span>Estudio Bíblico</span>
      </button>
    </nav>
    <div class="border-t border-line p-3">
      <button class="sidebar-btn w-full justify-start" style="color: var(--err);" (click)="logout()">
        <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.75" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
        <span>Cerrar sesión</span>
      </button>
    </div>
  </aside>

  <div class="flex flex-col flex-1 min-w-0 overflow-hidden">
    <header class="bg-surface border-b border-line h-14 px-4 flex items-center justify-between flex-shrink-0">
      <button class="btn-ghost lg:hidden" (click)="sidebarOpen.set(!sidebarOpen())" aria-label="Menú">
        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.75" d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
      <span class="text-sm text-ink-2">Vista general</span>
      <app-theme-toggle />
    </header>

    @if (notification()) {
      <div class="px-4 pt-2 flex-shrink-0">
        <div [class]="'alert ' + (notification()!.type === 'success' ? 'alert-ok' : notification()!.type === 'error' ? 'alert-err' : 'alert-info')">
          {{ notification()!.message }}
        </div>
      </div>
    }

    <main class="flex-1 overflow-y-auto bg-page px-4 py-5 sm:px-6 sm:py-6">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
